<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小小求职拿下</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --brand: #18b89a;
      --brand-dark: #0e9e84;
      --brand-light: #e6faf6;
      --ink: #0f172a;
      --ink-2: #334155;
      --ink-3: #64748b;
      --ink-4: #94a3b8;
      --border: #e8edf2;
      --surface: #f8fafc;
      --white: #ffffff;
      --red: #ef4444;
      --green: #22c55e;
      --radius: 14px;
      --shadow: 0 1px 4px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f1f5f9;
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .logo {
      font-size: 17px; font-weight: 700;
      color: var(--ink); letter-spacing: -0.3px;
    }
    header .logo span { color: var(--brand); }
    header .tagline {
      font-size: 12px; color: var(--ink-4);
      letter-spacing: 0.2px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      max-width: 1160px;
      margin: 28px auto;
      padding: 0 24px;
      align-items: stretch;
    }

    .left-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── 左侧上传 ── */
    .upload-panel {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .upload-panel h2 {
      font-size: 15px; font-weight: 700;
      color: var(--ink); letter-spacing: -0.2px; margin-bottom: 2px;
    }
    .upload-panel .sub { font-size: 12px; color: var(--ink-4); margin-bottom: 18px; }

    .dropzone {
      border: 1.5px dashed #c8d5e0;
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
      background: var(--surface);
      cursor: pointer;
      transition: all 0.18s;
    }
    .dropzone:hover, .dropzone.dragging {
      border-color: var(--brand);
      background: var(--brand-light);
    }
    .dropzone .icon { font-size: 26px; margin-bottom: 6px; }
    .dropzone .dz-text { font-size: 13px; font-weight: 500; color: var(--ink-2); }
    .dropzone .dz-hint { font-size: 11px; color: var(--ink-4); margin-top: 3px; }

    .file-input-row { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .file-name {
      font-size: 12px; color: var(--ink-3);
      background: var(--surface); border-radius: 8px;
      border: 1px solid var(--border);
      padding: 8px 12px; min-height: 34px;
      display: flex; align-items: center;
    }
    .btn-upload {
      width: 100%; padding: 11px;
      background: var(--brand); color: #fff;
      border: none; border-radius: 9px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.18s;
      letter-spacing: 0.1px;
    }
    .btn-upload:hover { background: var(--brand-dark); }
    .btn-upload:disabled { background: #c0cdd8; cursor: not-allowed; }

    .progress-wrap { margin-top: 14px; }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--ink-4); margin-bottom: 5px;
    }
    .progress-track {
      height: 5px; background: var(--border);
      border-radius: 999px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #34d9be, var(--brand));
      transition: width 0.2s;
    }
    .status-msg { margin-top: 10px; font-size: 12px; color: var(--ink-3); min-height: 18px; }
    .status-msg.error { color: var(--red); }
    .status-msg.ok { color: #16a34a; font-weight: 500; }

    /* ── 右侧结果 ── */
    .result-panel {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .result-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; min-height: 320px;
      color: #c8d5e0; gap: 10px;
    }
    .result-empty .empty-icon { font-size: 40px; opacity: 0.5; }
    .result-empty p { font-size: 13px; color: var(--ink-4); }

    .result-content { display: none; }

    /* MBTI 人格区 */
    .mbti-section {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .mbti-avatar {
      width: 100px; height: 100px;
      border-radius: 12px;
      object-fit: cover;
      background: var(--brand-light);
      flex-shrink: 0;
    }
    .mbti-avatar-placeholder {
      width: 100px; height: 100px;
      border-radius: 12px;
      background: var(--brand-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; flex-shrink: 0;
    }
    .mbti-info { flex: 1; padding-top: 2px; }
    .mbti-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--brand-light);
      border: 1px solid #a7f0e4; color: var(--brand-dark);
      border-radius: 999px; padding: 5px 14px;
      font-size: 18px; font-weight: 800; letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .mbti-badge .label {
      font-size: 10px; font-weight: 600;
      color: var(--brand); letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .mbti-name {
      font-size: 20px; font-weight: 700;
      color: var(--ink); letter-spacing: -0.3px; margin-bottom: 8px;
    }
    .mbti-desc { font-size: 13px; color: var(--ink-3); line-height: 1.6; }

    .mbti-traits { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .mbti-trait {
      font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 999px;
      border: 1px solid currentColor;
    }

    /* 人格解读 */
    .insight-box {
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .insight-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.6px; text-transform: uppercase;
      margin-bottom: 7px; opacity: 0.7;
    }
    .insight-text { font-size: 13px; line-height: 1.75; }

    /* 候选人简介 */
    .summary-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px; font-size: 13px;
      color: var(--ink-2); line-height: 1.75;
      margin-bottom: 24px;
    }

    /* 岗位推荐 */
    .section-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--ink-4); margin-bottom: 12px;
    }

    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .job-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      transition: all 0.18s;
      cursor: default;
      background: var(--white);
    }
    .job-card:hover {
      border-color: var(--brand);
      box-shadow: 0 4px 16px rgba(24,184,154,0.1);
      transform: translateY(-2px);
    }
    .job-card .job-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 6px;
    }
    .job-card .job-title {
      font-size: 13px; font-weight: 600;
      color: var(--ink); line-height: 1.3;
    }
    .job-card .match-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 999px; flex-shrink: 0; margin-left: 6px;
    }
    .match-high { background: #dcfce7; color: #15803d; }
    .match-mid { background: #fef9c3; color: #a16207; }

    .job-card .industry-tag {
      display: inline-block; font-size: 10px; font-weight: 500;
      background: var(--surface); color: var(--ink-3);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 7px;
      margin-bottom: 7px;
    }
    .job-card .job-reason { font-size: 11px; color: var(--ink-4); line-height: 1.5; }

    /* ── 简历诊断卡片 ── */
    .diagnosis-panel {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: none;
      flex: 1;
    }
    .diagnosis-panel.visible { display: flex; flex-direction: column; }

    .diag-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 14px;
    }
    .diag-title {
      font-size: 15px; font-weight: 700;
      color: var(--ink); letter-spacing: -0.2px;
    }
    .score-wrap { text-align: right; }
    .score-badge {
      font-size: 28px; font-weight: 800;
      color: var(--brand); line-height: 1;
    }
    .score-label { font-size: 10px; color: var(--ink-4); margin-top: 1px; }

    .diag-comment {
      font-size: 12px; color: var(--ink-3);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; margin-bottom: 14px;
      line-height: 1.6;
    }
    .diag-section { margin-bottom: 12px; }
    .diag-section-title {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--ink-4); margin-bottom: 6px;
    }
    .diag-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 10px;
      margin-bottom: 5px; font-size: 12px;
    }
    .diag-original { color: var(--red); text-decoration: line-through; margin-bottom: 3px; }
    .diag-suggestion { color: #16a34a; }
    .diag-empty { font-size: 12px; color: var(--ink-4); }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .jobs-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .jobs-grid { grid-template-columns: 1fr; }
      .mbti-section { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">小小求职拿下 <span>✦</span></div>
  <div class="tagline">AI 简历解析 · MBTI 推断 · 岗位推荐</div>
</header>

<div class="layout">

  <!-- 左侧：上传 -->
  <div class="left-col">
  <div class="upload-panel">
    <h2>上传简历</h2>
    <p class="sub">支持 PDF / DOCX，最大 5MB</p>

    <div id="dropzone" class="dropzone">
      <div class="icon">📄</div>
      <div class="dz-text">拖拽文件到这里</div>
      <div class="dz-hint">或点击下方选择文件</div>
    </div>

    <div class="file-input-row">
      <input id="fileInput" type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
      <div id="fileName" class="file-name">未选择文件</div>
      <button id="uploadBtn" class="btn-upload" disabled>开始解析</button>
    </div>

    <div id="progressWrap" class="progress-wrap" hidden>
      <div class="progress-meta">
        <span id="progressStage">准备中...</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>
    <div id="statusMsg" class="status-msg"></div>
  </div><!-- end upload-panel -->

  <!-- 简历诊断 -->
  <div id="diagnosisPanel" class="diagnosis-panel">
    <div class="diag-header">
      <div class="diag-title">📋 简历诊断</div>
      <div class="score-wrap">
        <div class="score-badge" id="diagScore">—</div>
        <div class="score-label">综合评分</div>
      </div>
    </div>
    <div id="diagComment" class="diag-comment"></div>

    <div class="diag-section">
      <div class="diag-section-title">🔤 错别字</div>
      <div id="diagTypos"></div>
    </div>
    <div class="diag-section">
      <div class="diag-section-title">✏️ 病句 / 语法</div>
      <div id="diagGrammar"></div>
    </div>
    <div class="diag-section">
      <div class="diag-section-title">♻️ 语意冗杂</div>
      <div id="diagRedundancy"></div>
    </div>
  </div>

  </div><!-- end left-col -->

  <!-- 右侧：结果 -->
  <div class="result-panel">
    <div id="resultEmpty" class="result-empty">
      <div class="empty-icon">🔍</div>
      <p>上传简历后，解析结果将在这里展示</p>
    </div>

    <div id="resultContent" class="result-content">

      <!-- MBTI 人格 -->
      <div class="mbti-section">
        <div id="mbtiAvatar" class="mbti-avatar-placeholder">🧠</div>
        <div class="mbti-info">
          <div id="mbtiBadge" class="mbti-badge">
            <span class="label">MBTI</span>
            <span id="mbtiValue">—</span>
          </div>
          <div id="mbtiName" class="mbti-name"></div>
          <div id="mbtiTraits" class="mbti-traits"></div>
          <div id="mbtiDesc" class="mbti-desc"></div>
        </div>
      </div>

      <!-- 人格深度解读 -->
      <div id="mbtiInsightBox" class="insight-box" style="display:none">
        <div class="insight-title">✦ 人格解读</div>
        <div id="mbtiInsight" class="insight-text"></div>
      </div>

      <!-- 候选人简介 -->
      <div class="summary-box" id="summaryText"></div>

      <!-- 岗位推荐 -->
      <div class="section-title">推荐岗位</div>
      <div id="jobsGrid" class="jobs-grid"></div>

    </div>
  </div>
</div>

<script src="./config.js"></script>
<script>
  const DEFAULT_API_BASE_URL = "http://127.0.0.1:8000";
  const API_BASE_URL = (window.APP_CONFIG?.API_BASE_URL || DEFAULT_API_BASE_URL).replace(/\/+$/, "");

  // MBTI 中文名称映射
  const MBTI_NAMES = {
    INTJ: "建筑师", INTP: "逻辑学家", ENTJ: "指挥官", ENTP: "辩论家",
    INFJ: "提倡者", INFP: "调停者", ENFJ: "主人公", ENFP: "竞选者",
    ISTJ: "物流师", ISFJ: "守卫者", ESTJ: "总经理", ESFJ: "执政官",
    ISTP: "鉴赏家", ISFP: "探险家", ESTP: "企业家", ESFP: "表演者"
  };

  // MBTI 人格详细解读
  const MBTI_DETAIL = {
    ENTJ: { color: "#7c3aed", bg: "#f5f3ff", traits: ["天生领导者", "战略思维", "果断执行", "目标驱动"], insight: "ENTJ 是天生的领导者，擅长制定长远战略并推动团队高效执行。他们逻辑清晰、意志坚定，在复杂局面中能迅速做出决策。对效率和成果有极高追求，适合承担管理与决策职责。" },
    ENTP: { color: "#0891b2", bg: "#ecfeff", traits: ["创新思维", "善于辩论", "思维敏捷", "挑战权威"], insight: "ENTP 是充满创意的思想家，热衷于探索新想法和挑战既有观念。他们口才出众、反应迅速，擅长在复杂问题中找到突破口，是团队中的创新引擎。" },
    INTJ: { color: "#0d9488", bg: "#f0fdfa", traits: ["独立思考", "系统规划", "追求完美", "洞察力强"], insight: "INTJ 是极具远见的战略家，善于构建复杂系统并独立推进目标。他们对知识有强烈渴望，做事严谨、标准极高，是少数能将宏观愿景落地为具体计划的人格类型。" },
    INTP: { color: "#2563eb", bg: "#eff6ff", traits: ["逻辑严密", "深度思考", "创意无限", "追求真理"], insight: "INTP 是沉浸于思想世界的逻辑学家，热衷于分析复杂理论和构建精密模型。他们思维灵活、善于发现规律，在技术研究和创新领域往往能产出突破性成果。" },
    ENFJ: { color: "#dc2626", bg: "#fef2f2", traits: ["感召力强", "关怀他人", "善于沟通", "推动成长"], insight: "ENFJ 是充满感召力的领导者，天生善于理解他人需求并激励团队成长。他们热情、有责任感，擅长建立深度信任关系，是优秀的导师和团队凝聚者。" },
    ENFP: { color: "#ea580c", bg: "#fff7ed", traits: ["热情洋溢", "创意丰富", "善于共情", "激励他人"], insight: "ENFP 是充满活力的理想主义者，对人和可能性充满热情。他们创意无限、善于激励他人，能在多元环境中快速建立连接，是团队中的活力与灵感来源。" },
    INFJ: { color: "#7c3aed", bg: "#f5f3ff", traits: ["深刻洞察", "理想主义", "坚定信念", "关怀他人"], insight: "INFJ 是罕见的理想主义者，兼具深刻的洞察力和强烈的使命感。他们善于理解他人内心，致力于推动有意义的改变，在需要同理心与远见的领域表现卓越。" },
    INFP: { color: "#0891b2", bg: "#ecfeff", traits: ["富有同情心", "创意写作", "价值观驱动", "内省深刻"], insight: "INFP 是温柔的理想主义者，被强烈的个人价值观所驱动。他们富有创造力和同理心，善于用文字和艺术表达深层情感，在人文与创意领域往往有独特建树。" },
    ISTJ: { color: "#374151", bg: "#f9fafb", traits: ["可靠负责", "注重细节", "遵守规则", "踏实执行"], insight: "ISTJ 是最可靠的执行者，以严谨、负责和一丝不苟著称。他们尊重规则和传统，做事有条不紊，是组织运转的重要支柱，在需要精确和稳定的岗位上表现出色。" },
    ISFJ: { color: "#0d9488", bg: "#f0fdfa", traits: ["体贴入微", "忠诚可靠", "服务他人", "注重和谐"], insight: "ISFJ 是温暖而尽职的守护者，以细心、忠诚和无私奉献著称。他们善于记住他人的需求，默默付出，是团队中不可或缺的稳定力量。" },
    ESTJ: { color: "#b45309", bg: "#fffbeb", traits: ["组织能力强", "务实高效", "责任心强", "重视秩序"], insight: "ESTJ 是高效的管理者，擅长建立秩序、制定规则并推动执行。他们务实、果断，对责任有强烈认同感，在需要组织协调和流程管理的岗位上如鱼得水。" },
    ESFJ: { color: "#dc2626", bg: "#fef2f2", traits: ["热心助人", "善于社交", "重视和谐", "责任感强"], insight: "ESFJ 是热情的社交者，以关心他人和维护团队和谐为己任。他们善于察觉他人情绪，乐于提供帮助，在需要人际协调和服务意识的岗位上表现突出。" },
    ISTP: { color: "#374151", bg: "#f9fafb", traits: ["动手能力强", "冷静分析", "灵活应变", "独立自主"], insight: "ISTP 是冷静的问题解决者，擅长在压力下快速分析并采取行动。他们喜欢探索事物运作原理，动手能力强，在技术和实操类工作中往往能展现出色的专业能力。" },
    ISFP: { color: "#0891b2", bg: "#ecfeff", traits: ["艺术感强", "温和包容", "活在当下", "忠于自我"], insight: "ISFP 是安静的艺术家，以敏锐的审美和真诚的个性著称。他们不喜欢冲突，善于用行动表达关怀，在创意、设计和需要个人风格的领域往往有独特表现。" },
    ESTP: { color: "#ea580c", bg: "#fff7ed", traits: ["行动力强", "善于交际", "把握机遇", "现实主义"], insight: "ESTP 是充满活力的实干家，善于在瞬息万变的环境中把握机遇。他们反应敏捷、善于交际，喜欢直接面对挑战，在销售、创业和需要快速决策的场景中表现亮眼。" },
    ESFP: { color: "#7c3aed", bg: "#f5f3ff", traits: ["活泼开朗", "善于表演", "享受当下", "感染力强"], insight: "ESFP 是天生的表演者，以热情、幽默和强大的感染力著称。他们享受与人互动，善于活跃气氛，在需要展示、沟通和娱乐的场合总能成为焦点。" },
  };

  // 16personalities 人物图片（使用官方 CDN）
  const MBTI_IMAGES = {
    INTJ: "https://www.16personalities.com/static/images/personality-types/avatars/intj-architect.svg",
    INTP: "https://www.16personalities.com/static/images/personality-types/avatars/intp-logician.svg",
    ENTJ: "https://www.16personalities.com/static/images/personality-types/avatars/entj-commander.svg",
    ENTP: "https://www.16personalities.com/static/images/personality-types/avatars/entp-debater.svg",
    INFJ: "https://www.16personalities.com/static/images/personality-types/avatars/infj-advocate.svg",
    INFP: "https://www.16personalities.com/static/images/personality-types/avatars/infp-mediator.svg",
    ENFJ: "https://www.16personalities.com/static/images/personality-types/avatars/enfj-protagonist.svg",
    ENFP: "https://www.16personalities.com/static/images/personality-types/avatars/enfp-campaigner.svg",
    ISTJ: "https://www.16personalities.com/static/images/personality-types/avatars/istj-logistician.svg",
    ISFJ: "https://www.16personalities.com/static/images/personality-types/avatars/isfj-defender.svg",
    ESTJ: "https://www.16personalities.com/static/images/personality-types/avatars/estj-executive.svg",
    ESFJ: "https://www.16personalities.com/static/images/personality-types/avatars/esfj-consul.svg",
    ISTP: "https://www.16personalities.com/static/images/personality-types/avatars/istp-virtuoso.svg",
    ISFP: "https://www.16personalities.com/static/images/personality-types/avatars/isfp-adventurer.svg",
    ESTP: "https://www.16personalities.com/static/images/personality-types/avatars/estp-entrepreneur.svg",
    ESFP: "https://www.16personalities.com/static/images/personality-types/avatars/esfp-entertainer.svg",
  };

  const dropzone = document.getElementById("dropzone");
  const fileInput = document.getElementById("fileInput");
  const uploadBtn = document.getElementById("uploadBtn");
  const fileNameEl = document.getElementById("fileName");
  const statusMsg = document.getElementById("statusMsg");
  const progressWrap = document.getElementById("progressWrap");
  const progressStage = document.getElementById("progressStage");
  const progressPercent = document.getElementById("progressPercent");
  const progressBar = document.getElementById("progressBar");
  const resultEmpty = document.getElementById("resultEmpty");
  const resultContent = document.getElementById("resultContent");

  let selectedFile = null;
  let parseTimer = null;

  function clearTimer() { if (parseTimer) { clearInterval(parseTimer); parseTimer = null; } }

  function setProgress(pct, stage) {
    const p = Math.max(0, Math.min(100, Math.round(pct)));
    progressWrap.hidden = false;
    progressBar.style.width = p + "%";
    progressPercent.textContent = p + "%";
    if (stage) progressStage.textContent = stage;
  }

  function setFile(file) {
    selectedFile = file || null;
    uploadBtn.disabled = !selectedFile;
    fileNameEl.textContent = selectedFile ? "📎 " + selectedFile.name : "未选择文件";
    statusMsg.textContent = "";
    statusMsg.className = "status-msg";
    clearTimer();
    progressWrap.hidden = true;
    setProgress(0, "准备中...");
  }

  function validFile(f) {
    const ext = (f.name.split(".").pop() || "").toLowerCase();
    return ext === "pdf" || ext === "docx";
  }

  fileInput.addEventListener("change", e => {
    const f = e.target.files[0];
    if (!f || !validFile(f)) { statusMsg.textContent = "仅支持 .pdf / .docx 文件"; statusMsg.className = "status-msg error"; return; }
    setFile(f);
  });

  dropzone.addEventListener("dragover", e => { e.preventDefault(); dropzone.classList.add("dragging"); });
  dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragging"));
  dropzone.addEventListener("drop", e => {
    e.preventDefault(); dropzone.classList.remove("dragging");
    const f = e.dataTransfer.files[0];
    if (!f || !validFile(f)) { statusMsg.textContent = "仅支持 .pdf / .docx 文件"; statusMsg.className = "status-msg error"; return; }
    setFile(f);
  });

  function renderResult(data) {
    const d = data.parsed_data || {};
    const mbti = (d.inferred_mbti || "").toUpperCase();

    // MBTI 徽章 + 名称
    document.getElementById("mbtiValue").textContent = mbti || "—";
    document.getElementById("mbtiName").textContent = MBTI_NAMES[mbti] ? `${MBTI_NAMES[mbti]}` : "";
    document.getElementById("mbtiDesc").textContent = d.mbti_description || "";

    // 特质标签 + 解读
    const detail = MBTI_DETAIL[mbti];
    const traitsEl = document.getElementById("mbtiTraits");
    const insightBox = document.getElementById("mbtiInsightBox");
    const insightEl = document.getElementById("mbtiInsight");
    traitsEl.innerHTML = "";
    if (detail) {
      detail.traits.forEach(t => {
        const span = document.createElement("span");
        span.className = "mbti-trait";
        span.style.color = detail.color;
        span.style.borderColor = detail.color + "55";
        span.style.background = detail.bg;
        span.textContent = t;
        traitsEl.appendChild(span);
      });
      insightEl.textContent = detail.insight;
      insightBox.style.background = detail.bg;
      insightBox.style.color = detail.color;
      insightBox.style.display = "block";
    }

    // 头像
    const avatarEl = document.getElementById("mbtiAvatar");
    if (mbti && MBTI_IMAGES[mbti]) {
      const img = document.createElement("img");
      img.className = "mbti-avatar";
      img.src = MBTI_IMAGES[mbti];
      img.alt = mbti;
      img.onerror = () => { avatarEl.parentNode.replaceChild(avatarEl, img); };
      avatarEl.parentNode.replaceChild(img, avatarEl);
    }

    // 简介
    document.getElementById("summaryText").textContent = d.candidate_summary || "";

    // 岗位推荐
    const jobsEl = document.getElementById("jobsGrid");
    jobsEl.innerHTML = "";
    (d.job_recommendations || []).forEach(job => {
      const card = document.createElement("div");
      card.className = "job-card";
      const matchClass = job.match_level === "高" ? "match-high" : "match-mid";
      card.innerHTML = `
        <div class="job-header">
          <div class="job-title">${job.title || ""}</div>
          <span class="match-badge ${matchClass}">${job.match_level || ""}</span>
        </div>
        <div class="industry-tag">${job.industry || ""}</div>
        <div class="job-reason">${job.reason || ""}</div>
      `;
      jobsEl.appendChild(card);
    });

    resultEmpty.style.display = "none";
    resultContent.style.display = "block";

    // 简历诊断
    const diag = d.resume_diagnosis || {};
    const diagPanel = document.getElementById("diagnosisPanel");
    document.getElementById("diagScore").textContent = diag.overall_score || "—";
    document.getElementById("diagComment").textContent = diag.overall_comment || "";

    function renderDiagItems(containerId, items) {
      const el = document.getElementById(containerId);
      el.innerHTML = "";
      if (!items || items.length === 0) {
        el.innerHTML = '<div class="diag-empty">未发现问题 ✓</div>';
        return;
      }
      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "diag-item";
        div.innerHTML = `<div class="diag-original">${item.original || ""}</div><div class="diag-suggestion">→ ${item.suggestion || ""}</div>`;
        el.appendChild(div);
      });
    }

    renderDiagItems("diagTypos", diag.typos);
    renderDiagItems("diagGrammar", diag.grammar_issues);
    renderDiagItems("diagRedundancy", diag.redundancy);
    diagPanel.classList.add("visible");
  }

  uploadBtn.addEventListener("click", async () => {
    if (!selectedFile) return;
    const formData = new FormData();
    formData.append("file", selectedFile);

    statusMsg.textContent = "正在解析，请稍候...";
    statusMsg.className = "status-msg";
    uploadBtn.disabled = true;
    resultEmpty.style.display = "flex";
    resultContent.style.display = "none";
    setProgress(0, "准备上传...");

    try {
      const data = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        let parseStarted = false, parsePct = 75;

        function startParse() {
          if (parseStarted) return; parseStarted = true;
          setProgress(72, "上传完成，AI 解析中...");
          clearTimer();
          parseTimer = setInterval(() => { parsePct = Math.min(95, parsePct + 1); setProgress(parsePct, "AI 解析中，请稍候..."); }, 350);
        }

        xhr.upload.onprogress = e => { if (e.lengthComputable) setProgress((e.loaded / e.total) * 70, "文件上传中..."); };
        xhr.upload.onload = startParse;
        xhr.onreadystatechange = () => { if (xhr.readyState >= 2) startParse(); };
        xhr.onload = () => {
          clearTimer();
          try {
            const payload = JSON.parse(xhr.responseText || "{}");
            if (xhr.status < 200 || xhr.status >= 300) { reject(new Error(payload.detail || "请求失败")); return; }
            setProgress(100, "解析完成");
            resolve(payload);
          } catch { reject(new Error("服务返回格式异常")); }
        };
        xhr.onerror = () => { clearTimer(); reject(new Error("网络错误，上传失败")); };
        xhr.timeout = 180000;
        xhr.ontimeout = () => { clearTimer(); reject(new Error("请求超时，请稍后重试")); };
        xhr.open("POST", `${API_BASE_URL}/upload`);
        xhr.send(formData);
      });

      statusMsg.textContent = "解析成功 ✓";
      statusMsg.className = "status-msg ok";
      renderResult(data);
    } catch (err) {
      clearTimer();
      statusMsg.textContent = "解析失败：" + err.message;
      statusMsg.className = "status-msg error";
      setProgress(0, "上传失败");
    } finally {
      uploadBtn.disabled = !selectedFile;
    }
  });
</script>
</body>
</html>
