services:
  - type: web
    name: resume-demo-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPU_MODEL
        value: glm-4-flash
      - key: MAX_FILE_SIZE_MB
        value: 5
      - key: ALLOWED_ORIGINS
        value: https://catarina-xxxcc.github.io,https://cv-programme-git-main-catarina-xxxccs-projects.vercel.app
